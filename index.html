<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RETROVAULTWEAR — Camisetas Retrô</title>


<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">

<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">


  <!-- Fonte pixel retro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ========================= HEADER / NAV ========================= -->
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="index.html" aria-label="Ir para início">
        <img class="brand__logo" src="images/logo1.svg" alt="RETROVAULTWEAR">
      </a>

      <nav class="nav">
        <a class="nav__link is-active" href="index.html">Início</a>
        <a class="nav__link" href="#colecoes">Coleções</a>
      </nav>

      <button class="navToggle" id="navToggle" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="navMobile" id="navMobile">
      <a class="navMobile__link" href="index.html">Início</a>
      <a class="navMobile__link" href="#colecoes">Coleções</a>
    </div>
  </header>

  <!-- ========================= HERO (SEM CARTÃO) ========================= -->
  <section class="hero">
    <div class="container hero__inner">
      <div class="hero__text">
        <h1 class="hero__title">Camisetas com estética retrô — Do clássico ao épico, vista sua nostalgia.</h1>
        <p class="hero__subtitle">
          Colecione o clássico.
        </p>

        <div class="hero__actions">
          <a class="btn" href="#colecoes">Ver coleções</a>
          <a class="btn btn--ghost" href="#" id="btnWhatsHeader">Comprar no WhatsApp</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ========================= COLEÇÕES ========================= -->
  <main class="container section" id="colecoes">
    <div class="section__head">
      <h2 class="section__title">Coleções</h2>
      <p class="section__hint">Clique em uma coleção para ver os produtos.</p>
    </div>

    <div class="grid" id="collectionsGrid"></div>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p>© <span id="year"></span> RETROVAULTWEAR</p>
      <a class="footer__link" href="#" id="btnWhatsFooter">Comprar pelo WhatsApp</a>
      <p class="footer__addr">📍 APUIARES-CE</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
